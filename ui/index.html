<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelLens</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header class="app-header" data-tauri-drag-region>
      <span class="app-title">PixelLens</span>
      <div class="header-actions">
        <button class="icon-btn" id="btn-settings" data-i18n-title="settings" aria-label="Settings">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-hide" data-i18n-title="hide" aria-label="Hide">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main view -->
    <main id="view-main" class="view active">

      <!-- Magnifier -->
      <section class="magnifier-section">
        <div class="magnifier-wrapper">
          <canvas id="magnifier-canvas" width="200" height="200" aria-label="Magnifier"></canvas>
          <div class="crosshair"></div>
        </div>
        <div class="coords-bar">
          <span id="coord-display">X: —  Y: —</span>
          <button class="icon-btn grid-btn active" id="btn-toggle-grid" aria-pressed="true">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="1"/>
              <line x1="3" y1="9" x2="21" y2="9"/>
              <line x1="3" y1="15" x2="21" y2="15"/>
              <line x1="9" y1="3" x2="9" y2="21"/>
              <line x1="15" y1="3" x2="15" y2="21"/>
            </svg>
          </button>
        </div>
      </section>

      <!-- Color preview -->
      <section class="color-preview-section">
        <div id="color-swatch" class="color-swatch" role="img" aria-label="Color preview"></div>
        <div class="color-name-block">
          <span id="color-name" class="color-name">—</span>
          <span id="color-name-sub" class="color-name-sub"></span>
        </div>
      </section>

      <!-- Consolidated value row -->
      <section class="color-values-section">
        <div class="value-row">
          <span class="value-data" id="val-combined">#——————  |  —, —, —  |  —</span>
          <button class="copy-btn" id="btn-copy-main" title="Copy">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>
      </section>

    </main>

    <!-- Settings view -->
    <main id="view-settings" class="view">
      <div class="settings-header">
        <button class="icon-btn" id="btn-back" data-i18n-title="back" aria-label="Back">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="settings-title" data-i18n="settings">Settings</span>
      </div>

      <div class="settings-body">

        <div class="setting-group">
          <label class="setting-label" data-i18n="theme">Theme</label>
          <div class="segmented" id="theme-selector">
            <button class="seg-btn active" data-value="dark"  data-i18n="dark">Dark</button>
            <button class="seg-btn"        data-value="light" data-i18n="light">Light</button>
          </div>
        </div>

        <div class="setting-group">
          <label class="setting-label" data-i18n="language">Language</label>
          <div class="segmented" id="lang-selector">
            <button class="seg-btn active" data-value="en">EN</button>
            <button class="seg-btn"        data-value="ja">日本語</button>
          </div>
        </div>

        <div class="setting-group">
          <label class="setting-label" data-i18n="zoom">Zoom</label>
          <div class="slider-row">
            <input type="range" id="zoom-slider" min="4" max="20" value="10" />
            <span id="zoom-label">10x</span>
          </div>
        </div>

        <div class="setting-group">
          <label class="setting-label" data-i18n="dictionary">Color Dictionary</label>
          <div class="segmented" id="dict-selector">
            <button class="seg-btn active" data-value="jis" data-i18n="jis">JIS</button>
            <button class="seg-btn"        data-value="web" data-i18n="web">Web</button>
          </div>
        </div>

        <div class="setting-group">
          <label class="setting-label" data-i18n="quickCopyFormat">Quick Copy Format</label>
          <select id="copy-format-select" class="select-input">
            <option value="hex">HEX uppercase — #FFFFFF</option>
            <option value="hex_lower">HEX lowercase — #ffffff</option>
            <option value="rgb">RGB CSS — rgb(255, 255, 255)</option>
            <option value="rgb_raw">RGB values — 255, 255, 255</option>
            <option value="hsl">HSL CSS — hsl(0, 0%, 100%)</option>
            <option value="float">Float — 1.000, 1.000, 1.000</option>
            <option value="hex_0x">0x notation — 0xFFFFFF</option>
            <option value="hex_no_hash">HEX no hash — FFFFFF</option>
            <option value="name">Color name</option>
          </select>
        </div>

        <div class="setting-group">
          <label class="setting-label" data-i18n="shortcut">Shortcut</label>
          <input type="text" id="shortcut-input" class="text-input" value="Ctrl+Alt+C" readonly />
          <span class="setting-hint" data-i18n="shortcutHint">Customization coming in next version</span>
        </div>

      </div>

      <div class="settings-footer">
        <button class="btn-primary" id="btn-save-settings" data-i18n="save">Save</button>
      </div>
    </main>

  </div>

  <!-- Toast -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Diagnostic inline script -->
  <script>
  (function() {
    var el = document.getElementById('coord-display');
    if (el) el.textContent = 'INLINE-JS-OK';
    window.addEventListener('error', function(ev) {
      var src = (ev.filename || '').split('/').pop() || 'injected';
      console.error('[PixelLens diag] ' + src + ':' + (ev.lineno||'?') + ' ' + ev.message);
    }, true);
    try {
      var inv = (window.__TAURI_INTERNALS__ && window.__TAURI_INTERNALS__.invoke)
        || (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke);
      if (typeof inv === 'function') {
        inv('js_log', { level: 'INFO', msg: 'inline-script-ran ipc=OK' });
      } else {
        if (el) el.textContent = 'INLINE-OK-NO-IPC';
      }
    } catch(e) {
      if (el) el.textContent = 'INLINE-ERR:' + String(e).substring(0, 40);
    }
  })();
  </script>
  <script src="app.js?v=11" onerror="document.getElementById('coord-display').textContent='APP-JS-LOAD-ERR'"></script>
</body>
</html>
